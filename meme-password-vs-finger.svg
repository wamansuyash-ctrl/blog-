<svg viewBox="0 0 780 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="780" height="300" fill="#fff8f0" rx="12"/>
  <rect width="780" height="300" fill="none" stroke="#fed7aa" stroke-width="2" rx="12"/>

  <!-- Title -->
  <text x="390" y="34" text-anchor="middle" fill="#7c2d12" font-size="17" font-weight="bold">🧠 Your Brain vs Your Finger: The Auth Showdown</text>

  <!-- LEFT PANEL - Password -->
  <rect x="30" y="55" width="330" height="210" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="195" y="85" text-anchor="middle" fill="#b91c1c" font-size="15" font-weight="bold">🔑 Using a Password</text>

  <text x="195" y="115" text-anchor="middle" fill="#374151" font-size="13">You: "What was my password again?"</text>
  <text x="195" y="137" text-anchor="middle" fill="#6b7280" font-size="38">🤔</text>
  <text x="195" y="175" text-anchor="middle" fill="#374151" font-size="12">"Was it 'fluffy1234'? No wait..."</text>
  <text x="195" y="193" text-anchor="middle" fill="#374151" font-size="12">"Did I use a capital letter?"</text>
  <text x="195" y="211" text-anchor="middle" fill="#374151" font-size="12">"Is this the one with the @?"</text>

  <rect x="70" y="228" width="250" height="26" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="195" y="245" text-anchor="middle" fill="#b91c1c" font-size="12" font-weight="bold">❌ Too many attempts. Locked out. 💀</text>

  <!-- RIGHT PANEL - Fingerprint -->
  <rect x="420" y="55" width="330" height="210" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="585" y="85" text-anchor="middle" fill="#15803d" font-size="15" font-weight="bold">☝️ Using a Fingerprint</text>

  <text x="585" y="115" text-anchor="middle" fill="#374151" font-size="13">You: [exists near phone]</text>
  <text x="585" y="147" text-anchor="middle" fill="#374151" font-size="38">😴</text>
  <text x="585" y="180" text-anchor="middle" fill="#374151" font-size="13">Phone: "Yep, that's you."</text>
  <text x="585" y="200" text-anchor="middle" fill="#374151" font-size="13">*unlocks in 0.3 seconds*</text>

  <rect x="460" y="228" width="250" height="26" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="585" y="245" text-anchor="middle" fill="#15803d" font-size="12" font-weight="bold">✅ You're in. Barely woke up. 😎</text>

  <!-- VS badge -->
  <circle cx="390" cy="160" r="24" fill="#f59e0b"/>
  <text x="390" y="167" text-anchor="middle" fill="white" font-size="16" font-weight="bold">VS</text>

  <!-- Bottom footer -->
  <text x="390" y="290" text-anchor="middle" fill="#9ca3af" font-size="11">Biometrics: because remembering things is hard and your finger is always with you</text>
</svg>
