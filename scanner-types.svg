<svg viewBox="0 0 820 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="capBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
    <linearGradient id="optBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4"/>
      <stop offset="100%" style="stop-color:#dcfce7"/>
    </linearGradient>
    <linearGradient id="ultraBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf4ff"/>
      <stop offset="100%" style="stop-color:#f3e8ff"/>
    </linearGradient>
  </defs>

  <rect width="820" height="360" fill="#f8fafc" rx="12"/>
  <rect width="820" height="360" fill="none" stroke="#e2e8f0" stroke-width="2" rx="12"/>

  <text x="410" y="36" text-anchor="middle" fill="#0f172a" font-size="20" font-weight="bold">3 Types of Fingerprint Scanners</text>
  <text x="410" y="56" text-anchor="middle" fill="#64748b" font-size="13">Same goal, very different tech hiding underneath</text>

  <!-- === Card 1: Capacitive === -->
  <rect x="30" y="72" width="234" height="265" rx="14" fill="url(#capBg)" stroke="#93c5fd" stroke-width="2"/>
  
  <!-- Icon -->
  <rect x="95" y="95" width="100" height="60" rx="6" fill="#1d4ed8" opacity="0.12"/>
  <rect x="110" y="102" width="70" height="4" rx="2" fill="#2563eb"/>
  <rect x="110" y="112" width="70" height="4" rx="2" fill="#2563eb"/>
  <rect x="110" y="122" width="70" height="4" rx="2" fill="#2563eb"/>
  <rect x="110" y="132" width="70" height="4" rx="2" fill="#2563eb"/>
  <rect x="110" y="142" width="70" height="4" rx="2" fill="#2563eb"/>
  <!-- Finger -->
  <ellipse cx="145" cy="95" rx="30" ry="15" fill="#fddcb5" stroke="#f0b884" stroke-width="1.5"/>
  
  <text x="147" y="182" text-anchor="middle" fill="#1d4ed8" font-size="16" font-weight="bold">⚡ Capacitive</text>
  <text x="147" y="202" text-anchor="middle" fill="#1e40af" font-size="12">The Classic</text>

  <line x1="55" y1="213" x2="239" y2="213" stroke="#bfdbfe" stroke-width="1.5"/>

  <text x="65" y="232" fill="#334155" font-size="12">✓ Uses tiny capacitors</text>
  <text x="65" y="250" fill="#334155" font-size="12">✓ Detects ridge vs valley</text>
  <text x="65" y="268" fill="#334155" font-size="12">✓ Used in most phones</text>
  <text x="65" y="286" fill="#334155" font-size="12">✓ Fast &amp; accurate</text>
  <text x="65" y="304" fill="#ef4444" font-size="12">✗ Only works dry skin</text>

  <rect x="50" y="316" width="190" height="10" rx="5" fill="#dbeafe"/>
  <rect x="50" y="316" width="152" height="10" rx="5" fill="#2563eb"/>
  <text x="147" y="340" text-anchor="middle" fill="#1d4ed8" font-size="11" font-weight="bold">Popularity: 85%</text>

  <!-- === Card 2: Optical === -->
  <rect x="293" y="72" width="234" height="265" rx="14" fill="url(#optBg)" stroke="#86efac" stroke-width="2"/>

  <!-- Icon: light rays -->
  <rect x="358" y="105" width="100" height="50" rx="6" fill="#15803d" opacity="0.1"/>
  <!-- Light source -->
  <circle cx="408" cy="92" r="12" fill="#fef08a" stroke="#eab308" stroke-width="1.5"/>
  <!-- Rays -->
  <line x1="395" y1="102" x2="370" y2="130" stroke="#fbbf24" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="408" y1="104" x2="408" y2="132" stroke="#fbbf24" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="421" y1="102" x2="445" y2="130" stroke="#fbbf24" stroke-width="2" stroke-dasharray="3,2"/>
  <!-- Sensor strip -->
  <rect x="358" y="130" width="100" height="12" rx="3" fill="#16a34a"/>

  <text x="410" y="182" text-anchor="middle" fill="#15803d" font-size="16" font-weight="bold">💡 Optical</text>
  <text x="410" y="202" text-anchor="middle" fill="#166534" font-size="12">The Light Photographer</text>

  <line x1="318" y1="213" x2="502" y2="213" stroke="#bbf7d0" stroke-width="1.5"/>

  <text x="318" y="232" fill="#334155" font-size="12">✓ Uses LED + image sensor</text>
  <text x="318" y="250" fill="#334155" font-size="12">✓ Captures a photo</text>
  <text x="318" y="268" fill="#334155" font-size="12">✓ Cheap to make</text>
  <text x="318" y="286" fill="#334155" font-size="12">✓ Works wet sometimes</text>
  <text x="318" y="304" fill="#ef4444" font-size="12">✗ Can be fooled by photo</text>

  <rect x="318" y="316" width="190" height="10" rx="5" fill="#dcfce7"/>
  <rect x="318" y="316" width="95" height="10" rx="5" fill="#16a34a"/>
  <text x="413" y="340" text-anchor="middle" fill="#15803d" font-size="11" font-weight="bold">Popularity: 50%</text>

  <!-- === Card 3: Ultrasonic === -->
  <rect x="556" y="72" width="234" height="265" rx="14" fill="url(#ultraBg)" stroke="#d8b4fe" stroke-width="2"/>

  <!-- Icon: sound waves -->
  <circle cx="673" cy="118" r="8" fill="#7c3aed" opacity="0.7"/>
  <circle cx="673" cy="118" r="18" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <circle cx="673" cy="118" r="28" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>
  <circle cx="673" cy="118" r="38" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.25"/>
  <!-- Under display indicator -->
  <rect x="623" y="148" width="100" height="8" rx="3" fill="#7c3aed" opacity="0.3"/>
  <text x="673" y="157" text-anchor="middle" fill="#6d28d9" font-size="9">Under Display</text>

  <text x="673" y="182" text-anchor="middle" fill="#6d28d9" font-size="16" font-weight="bold">🔊 Ultrasonic</text>
  <text x="673" y="202" text-anchor="middle" fill="#5b21b6" font-size="12">The 3D Wizard</text>

  <line x1="581" y1="213" x2="765" y2="213" stroke="#e9d5ff" stroke-width="1.5"/>

  <text x="581" y="232" fill="#334155" font-size="12">✓ Uses sound waves</text>
  <text x="581" y="250" fill="#334155" font-size="12">✓ Creates 3D ridge map</text>
  <text x="581" y="268" fill="#334155" font-size="12">✓ Works wet or dry</text>
  <text x="581" y="286" fill="#334155" font-size="12">✓ Under-display possible</text>
  <text x="581" y="304" fill="#ef4444" font-size="12">✗ Expensive!</text>

  <rect x="581" y="316" width="190" height="10" rx="5" fill="#f3e8ff"/>
  <rect x="581" y="316" width="70" height="10" rx="5" fill="#7c3aed"/>
  <text x="676" y="340" text-anchor="middle" fill="#6d28d9" font-size="11" font-weight="bold">Popularity: 35%</text>
</svg>
